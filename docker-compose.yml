version: "3.9"

services:
  ragbot:
    build: .
    container_name: ragbot
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/etc/ragbot/config.json:ro
      - ragbot_data:/data
    environment:
      # Override these via an .env file or inline.
      # LLM_BASE_URL, LLM_API_KEY, LLM_MODEL, EMBEDDING_BASE_URL, etc.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    restart: unless-stopped

volumes:
  ragbot_data:
